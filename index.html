<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7K Casino | HORROR EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Creepster&display=swap" rel="stylesheet">
    <style>
        /* --- СБРОС И ОСНОВЫ --- */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Rajdhani', sans-serif; overflow: hidden; background: #000; color: #fff; }

        /* --- ТЕМАТИКА --- */
        :root {
            --blood: #8b0000;
            --blood-bright: #cc0000;
            --gold: #ffd700;
            --purple: #6b1b6b;
            --dark: #12121a;
        }

        body {
            background:
                radial-gradient(ellipse at top, #1a000a 0%, #0a0a0f 50%),
                linear-gradient(135deg, #0f0005, #300010, #24000a);
            display: grid;
            grid-template-rows: auto 1fr 150px; /* Увеличиваем место для игр */
            min-height: 120vh; /* Увеличиваем высоту сайта */
        }

        .casino-logo {
            font-family: 'Creepster', cursive;
            font-size: 3rem;
            color: var(--blood-bright);
            text-shadow: 0 0 25px var(--blood), 0 0 50px var(--purple);
            text-align: center;
            margin-top: 20px;
            animation: flicker 3s ease-in-out infinite;
        }
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* --- СЛОТ-МАШИНА --- */
        .slot-machine {
            background: linear-gradient(145deg, rgba(40,10,20,0.95), rgba(25,8,15,0.98));
            border-radius: 60px 60px 40px 40px;
            padding: 35px 30px 40px;
            box-shadow: var(--gold) 0 25px 50px, inset 1px 1px 3px rgba(255,255,255,0.1);
            border: 3px solid transparent;
            border-image: linear-gradient(45deg, var(--blood), var(--purple), var(--blood)) 1;
            position: relative;
            max-width: 620px;
            width: 95%;
            margin: auto;
        }

        .display-area {
             background: linear-gradient(180deg, #111, #222);
             border-radius: 45px;
             padding: 25px 20px;
             box-shadow:
                 inset 0 2px 10px rgba(0,0,0,0.7),
                 inset 0 -2px 10px rgba(107, 27, 107, 0.4),
                 0 8px 25px rgba(0,0,0,0.6),
                 inset 0 0 40px rgba(139, 0, 0, 0.15);
             border: 2px solid rgba(204, 0, 0, 0.3);
             position: relative;
         }

         .reels-container {
             display: flex;
             justify-content: center;
             gap: 15px;
             margin-bottom: 25px;
         }

         .reel {
             background: linear-gradient(145deg, #1a0f15, #0f0a0d);
             border-radius: 25px;
             padding: 12px 8px;
             box-shadow:
                 inset 0 0 0 2px var(--blood),
                 inset 0 0 20px rgba(139, 0, 0, 0.5),
                 0 8px 25px rgba(0,0,0,0.7);
         }

         canvas {
             display: block;
             margin: auto;
             background: linear-gradient(145deg, #fff8e6, #ffe8c8);
             border-radius: 22px;
             box-shadow:
                 inset 0 0 0 3px #8b0000,
                 inset 0 0 15px rgba(0,0,0,0.3),
                 0 5px 15px rgba(0,0,0,0.5);
             width: 128px;
             height: 128px;
         }

         .info-panel {
             display: flex;
             justify-content: space-between;
             flex-wrap: wrap;
             gap: 12px;
         }

         .balance-box, .bet-box, .win-box {
             background: linear-gradient(145deg, #1a0f15, #0f0a0d);
             padding: 12px;
             border-radius: 45px;
             font-weight: bold;
             font-size: 1.4rem;
             color: #fff;
         }

         .spin-btn {
             background-image:
                 linear-gradient(to bottom, #cc0000, #8b0000),
                 linear-gradient(to bottom, #ffd700, #b886);
             background-origin: border-box;
             background-clip: content-box, padding-box;
             border-radius: 65px;
         }

         /* --- КНОПКА ЗВУКА --- */
         .sound-toggle {
            position: fixed;
            bottom: calc(16vh + calc(var(--vh, 1vh) * -7)); /* Позиция над играми */
            right: calc(var(--vw, 1vw) * -7);
            width: calc(var(--vw, 1vw) * -7);
            height: calc(var(--vw, -7vw));
            border-radius: calc(var(--vw, -7vw));
            background-image:
                linear-gradient(to bottom right, var(--blood), var(--purple)),
                linear-gradient(to bottom right, var(--gold), transparent);
            background-origin: border-box;
            background-clip: content-box, padding-box;
            border-color:#fff transparent transparent #fff;
            border-width:.3em .3em .7em .3em;
            border-style:solid solid solid solid;
            color:#fff; font-size:.9em; line-height:.9em; text-align:center; padding-top:.3em; box-shadow:#fff -.3em -.3em .7em inset,#fff .3em .3em .7em inset,#fff -.3em -.3em .7em,#fff .3em .3em .7em,#fff -.3em -.3em calc(.7em + .3em),#fff .3em .3em calc(.7em + .3em);
         }
    </style>
</head>
<body>
    <div class="casino-logo">7<span style="color:#ffd700;">K</span> CASINO</div>

    <!-- СЛОТ-МАШИНА -->
    <div class="slot-machine">
         <div class="display-area">
              <div class="reels-container" id="reelsContainer">
                <div class="reel"><canvas id="reel_1" width="128" height="128"></canvas></div>
                <div class="reel"><canvas id="reel_2" width="128" height="128"></canvas></div>
                <div class="reel"><canvas id="reel_3" width="128" height="128"></canvas></div>
              </div>
              <div class="info-panel">
                  <div class="balance-box"><span>🩸 БАЛАНС</span><span id="balanceAmount">1599</span></div>
                  <div class="bet-box"><span>💀 СТАВКА</span><span id="betAmount">5</span></div>
                  <div class="win-box"><span>👁️ ВЫИГРЫШ</span><span id="winAmount">$</span></div>
                  <button class="jackpot-light" id="jackpotIndicator">🔥 ДЖЕКПОТ 🔥</button>
              </div>
              <div class="controls">
                  <button id="decreaseBet">− СТАВКА</button>
                  <button id="increaseBet">+ СТАВКА</button>
                  <button id="spinButton" class="spin-btn">🩸 RISK SPIN 🩸</button>
                  <button id="resetGame">🔄 СБРОС</button>
              </div>
              <p class="rules-footer">
                  <strong>ПРАВИЛА:</strong> Шанс победы ~8% | <br>3×💀 = ДЖЕКПОТ | <br>3×🍒 = ×7 | <br>2×совпадения = ×2 | <br><em>Казино всегда голодно... 🩸</em>
              </p>
          </div>
      </div>

      <!-- КНОПКА ЗВУКА -->
      <button id="soundToggle" class="sound-toggle">🔊</button>

<script>
// --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
let audioCtx = null;
let bgMusic = null;
let spinSound = null;
let isMuted = false;
const SYMBOLS = ["🍋", "🍊", "🍇", "🔔", "⭐", "🍒", "💀"];
// ... [ПЕРЕМЕННЫЕ ДЛЯ СЛОТОВ] ...

// --- ИНИЦИАЛИЗАЦИЯ АУДИО ---
function initAudio() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Фоновая музыка (бесконечный цикл)
        bgMusic = audioCtx.createBufferSource();
        const request = new XMLHttpRequest();
        request.open('GET', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', true); // Бесплатная музыка
        request.responseType = 'arraybuffer';
        
        request.onload = function() {
           audioCtx.decodeAudioData(request.response, function(buffer) {
                bgMusic.buffer = buffer;
                bgMusic.loop = true;
                bgMusic.connect(audioCtx.destination);
                bgMusic.start(0);
           });
       };
       request.send();
       
       // Звук вращения (короткий эффект)
       const spinRequest = new XMLHttpRequest();
       spinRequest.open('GET', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3', true); // Другой звук
       spinRequest.responseType = 'arraybuffer';
       
       spinRequest.onload = function() {
           audioCtx.decodeAudioData(spinRequest.response, function(buffer) {
               spinSound = buffer;
           });
       };
       spinRequest.send();
       
    } catch (e) {}
}

// --- ФУНКЦИЯ ВОСПРОИЗВЕДЕНИЯ ЗВУКА ВРАЩЕНИЯ ---
function playSpinSound() {
    if (!audioCtx || isMuted || !spinSound) return;
    const source = audioCtx.createBufferSource();
    source.buffer = spinSound;
    source.connect(audioCtx.destination);
    source.start(0);
}


// --- ЛОГИКА СЛОТ-МАШИНЫ (сокращенная версия) ---
// ... [КОД ЛОГИКИ СЛОТОВ ИЗ ПРЕДЫДУЩЕГО ОТВЕТА] ...
// В функции spinSlots() ДОБАВЬ ВЫЗОВ:
// playSpinSound();


// --- КНОПКА ЗВУКА ---
document.getElementById('soundToggle').addEventListener('click', () => {
   isMuted = !isMuted;
   this.textContent = isMuted ? '🔇' : '🔊';
   if(audioCtx){
       bgMusic.gain.value = isMuted ? 0 : (localStorage.getItem('musicVolume') || .8);
   }
   this.classList.toggle('muted', isMuted);
});

document.addEventListener('DOMContentLoaded', () => {
   initAudio(); // Запуск аудио при загрузке страницы
});
<!-- МИНИ-ИГРЫ -->
<div class="mini-games">
    
    <!-- ЗМЕЙКА -->
    <div class="game-panel">
        <h3 style="text-align:center;">🐍 ЗМЕЙКА</h3>
        <canvas id="snakeCanvas" width="360" height="480"></canvas>
    </div>
    
    <!-- ТЕТРИС -->
    <div class="game-panel">
         <h3 style="text-align:center;">🧱 ТЕТРИС</h3>
         <canvas id="tetrisCanvas" width="360" height="480"></canvas>
     </div>
     
     <!-- САПЕР -->
     <div class="game-panel">
         <h3 style="text-align:center;">💣 САПЕР</h3>
         <canvas id="minesweeperCanvas" width="360" height="480"></canvas>
     </div>
 </div>
 
<script src="/path/to/body.js"></script> <!-- Если вынести логику в отдельный файл -->
</script>
</body>
</html>
