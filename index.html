   drawSnake();
   resetSnake();
   
   // Старт циклов игр
   snakeGameInterval = setInterval(moveSnake, parseInt(localStorage.getItem('snakeSpeed')) || 88);
   
   // Кнопка звука
   document.getElementById('soundToggle').addEventListener('click', () => {
      isMuted = !isMuted;
      this.textContent = isMuted ? '🔇' : '🔊';
      if(audioCtx){
          bgMusic.gain.value = isMuted ? 0 : (localStorage.getItem('musicVolume') || .8);
      }
      this.classList.toggle('muted', isMuted);
   });
});
</script>
</body>
</html>
