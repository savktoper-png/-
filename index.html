<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
    <title>7K Casino | Слот-симулятор</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        :root {
            --7k-gold: #ffd700;
            --7k-gold-dark: #b8860b;
            --7k-purple: #6b1b6b;
            --7k-purple-dark: #3d0d3d;
            --7k-black: #0a0a0f;
            --7k-dark: #12121a;
            --7k-glow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(107, 27, 107, 0.4);
            --7k-red: #ff1744;
        }

        body {
            background: 
                radial-gradient(ellipse at top, #1a0a2e 0%, var(--7k-black) 50%),
                repeating-radial-gradient(circle at 0 0, transparent 0, var(--7k-black) 10px),
                linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
            position: relative;
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, var(--7k-gold), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,215,0,0.6), transparent),
                radial-gradient(2px 2px at 90px 40px, var(--7k-purple), transparent);
            background-size: 200px 200px;
            animation: sparkle 8s linear infinite;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes sparkle {
            0% { background-position: 0 0, 0 0, 0 0; }
            100% { background-position: 200px 200px, 150px 100px, 100px 150px; }
        }

        .casino-logo {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--7k-gold);
            text-shadow: 0 0 10px var(--7k-gold), 0 0 20px var(--7k-purple), 0 0 40px rgba(255, 215, 0, 0.8);
            letter-spacing: 4px;
            z-index: 10;
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 10px var(--7k-gold), 0 0 20px var(--7k-purple); }
            50% { text-shadow: 0 0 20px var(--7k-gold), 0 0 40px var(--7k-purple), 0 0 60px rgba(255,215,0,0.9); }
        }

        .casino-logo span {
            color: var(--7k-purple);
            text-shadow: 0 0 15px var(--7k-gold);
        }

        .slot-machine {
            background: linear-gradient(145deg, rgba(30,15,45,0.95), rgba(18,12,30,0.98));
            border-radius: 60px 60px 40px 40px;
            padding: 35px 30px 40px 30px;
            box-shadow: var(--7k-glow), 0 25px 50px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 3px solid transparent;
            border-image: linear-gradient(45deg, var(--7k-gold), var(--7k-purple), var(--7k-gold)) 1;
            position: relative;
            z-index: 5;
            max-width: 520px;
            width: 100%;
        }

        .slot-machine::before {
            content: '7K';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, var(--7k-gold), #fff, var(--7k-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            padding: 5px 25px;
            border-radius: 30px;
            border: 2px solid var(--7k-gold);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            pointer-events: none;
        }

        .display-area {
            background: linear-gradient(180deg, #0d0d15 0%, #151025 100%);
            border-radius: 45px;
            padding: 25px 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.6), inset 0 -2px 10px rgba(107, 27, 107, 0.3), 0 8px 25px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        .reels-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            position: relative;
        }

        .reels-container::before,
        .reels-container::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--7k-gold);
            font-size: 2rem;
            text-shadow: 0 0 10px var(--7k-gold);
            opacity: 0.7;
            z-index: 1;
            pointer-events: none;
        }
        .reels-container::before { left: -25px; }
        .reels-container::after { right: -25px; }

        .reel {
            background: linear-gradient(145deg, #1a1525, #0f0d1a);
            border-radius: 25px;
            padding: 10px 6px;
            box-shadow: inset 0 0 0 2px var(--7k-gold-dark), inset 0 0 20px rgba(107, 27, 107, 0.4), 0 8px 25px rgba(0,0,0,0.6);
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .reel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--7k-gold), transparent);
            animation: scanline 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: linear-gradient(145deg, #fff9e6, #ffecb3);
            border-radius: 22px;
            box-shadow: inset 0 0 0 3px #d4af37, inset 0 0 15px rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.4);
            width: 115px;
            height: 115px;
            position: relative;
            touch-action: none;
        }

        canvas::after {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border-radius: 18px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }

        .info-panel {
            background: linear-gradient(135deg, rgba(30,20,50,0.9), rgba(20,15,35,0.95));
            backdrop-filter: blur(12px);
            border-radius: 55px;
            margin-top: 22px;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .balance-box, .bet-box, .win-box {
            background: linear-gradient(145deg, #1a1225, #0f0c18);
            padding: 10px 22px;
            border-radius: 45px;
            font-weight: 700;
            font-size: 1.4rem;
            color: #fff;
            text-shadow: 0 2px 0 rgba(0,0,0,0.5);
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            min-width: 140px;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .balance-box:active, .bet-box:active, .win-box:active {
            transform: scale(0.98);
        }

        .balance-box span, .bet-box span, .win-box span {
            font-size: 0.8rem;
            color: var(--7k-gold);
            margin-right: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
        }

        .jackpot-light {
            background: linear-gradient(45deg, #ff6b6b, var(--7k-gold), #ff6b6b);
            background-size: 200% 200%;
            animation: gradient-shift 3s ease infinite;
            border-radius: 45px;
            padding: 8px 20px;
            font-size: 1.05rem;
            font-weight: 800;
            text-align: center;
            color: #1a0a2e;
            font-family: 'Orbitron', monospace;
            text-shadow: 0 1px 0 rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            min-width: 180px;
            border: 2px solid #fff;
            cursor: pointer;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .controls {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(to bottom, #d4af37, #a67c00);
            border: none;
            font-size: 1.15rem;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 50px;
            color: #1a0a00;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 #7a5400, 0 8px 20px rgba(0,0,0,0.4);
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.4s ease;
            pointer-events: none;
        }

        button:hover::before,
        button:active::before {
            left: 100%;
        }

        button:active {
            transform: translateY(4px) !important;
            box-shadow: 0 2px 0 #7a5400, 0 4px 10px rgba(0,0,0,0.4) !important;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #7a5400, 0 12px 25px rgba(212, 175, 55, 0.5);
        }

        .spin-btn {
            background: linear-gradient(to bottom, #ffd700, #e6b400, #cc9900);
            font-size: 1.5rem;
            padding: 12px 45px;
            box-shadow: 0 7px 0 #996600, 0 0 25px rgba(255, 215, 0, 0.6), 0 10px 30px rgba(0,0,0,0.5);
            font-family: 'Orbitron', monospace;
            letter-spacing: 2px;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 7px 0 #996600, 0 0 25px rgba(255, 215, 0, 0.6), 0 10px 30px rgba(0,0,0,0.5); }
            50% { box-shadow: 0 7px 0 #996600, 0 0 35px rgba(255, 215, 0, 0.9), 0 10px 40px rgba(255, 215, 0, 0.4); }
        }

        .spin-btn:hover {
            animation: none;
            box-shadow: 0 9px 0 #996600, 0 0 45px rgba(255, 215, 0, 1), 0 15px 40px rgba(255, 215, 0, 0.6);
        }

        #resetGame {
            background: linear-gradient(to bottom, #6b1b6b, #4a0f4a);
            color: #fff;
            box-shadow: 0 6px 0 #330a33, 0 8px 20px rgba(107, 27, 107, 0.5);
        }

        #resetGame:hover {
            box-shadow: 0 8px 0 #330a33, 0 12px 25px rgba(107, 27, 107, 0.7);
        }

        button:disabled {
            opacity: 0.5;
            transform: none !important;
            cursor: not-allowed;
            filter: grayscale(0.3);
            box-shadow: 0 4px 0 #555 !important;
        }

        .rules-footer {
            text-align: center;
            margin-top: 18px;
            font-size: 0.7rem;
            color: #8b7355;
            background: rgba(30, 20, 50, 0.6);
            padding: 8px 12px;
            border-radius: 25px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            line-height: 1.3;
        }

        .rules-footer strong {
            color: var(--7k-gold);
            font-family: 'Orbitron', monospace;
        }

        .win-animation {
            animation: win-flash 0.25s ease 4;
        }

        @keyframes win-flash {
            0%, 100% { box-shadow: inset 0 0 0 2px var(--7k-gold-dark); }
            50% { box-shadow: inset 0 0 20px var(--7k-gold), 0 0 30px rgba(255, 215, 0, 0.8); }
        }

        /* === СКРИМЕР === */
        .screamer-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.05s;
        }

        .screamer-overlay.active {
            opacity: 1;
            pointer-events: all;
            animation: screamer-flash 0.1s steps(1) infinite;
        }

        @keyframes screamer-flash {
            0%, 100% { background: #000; }
            50% { background: #ff0000; }
        }

        .screamer-face {
            font-size: clamp(80px, 25vw, 180px);
            animation: screamer-shake 0.05s ease-in-out infinite;
            text-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000;
            filter: drop-shadow(0 0 20px #ff0000);
        }

        @keyframes screamer-shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(-5px, 3px) rotate(-2deg) scale(1.02); }
            50% { transform: translate(3px, -4px) rotate(2deg) scale(0.98); }
            75% { transform: translate(-2px, 2px) rotate(-1deg) scale(1.01); }
        }

        .screamer-text {
            color: #fff;
            font-family: 'Orbitron', monospace;
            font-size: clamp(20px, 5vw, 40px);
            font-weight: 900;
            text-align: center;
            margin-top: 20px;
            text-shadow: 0 0 10px #ff0000;
            animation: text-flicker 0.1s infinite;
        }

        @keyframes text-flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .screamer-close {
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--7k-red);
            color: #fff;
            border: 3px solid #fff;
            border-radius: 50px;
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            animation: pulse-red 0.3s ease-in-out infinite;
            touch-action: manipulation;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 20px var(--7k-red); }
            50% { box-shadow: 0 0 40px #ff0000, 0 0 60px #ff0000; }
        }

        /* === Уведомления === */
        .notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, var(--7k-purple), #2a0a3a);
            color: var(--7k-gold);
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255, 215, 0, 0.5);
            border: 2px solid var(--7k-gold);
            z-index: 100;
            transition: transform 0.4s ease;
            text-align: center;
            max-width: 90vw;
            pointer-events: none;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .notification.jackpot {
            animation: jackpot-bounce 0.6s ease;
            background: linear-gradient(45deg, #ff006e, #ff6b00, var(--7k-gold));
            color: #000;
            font-size: 1.3rem;
            text-shadow: 0 2px 0 rgba(255,255,255,0.3);
        }

        @keyframes jackpot-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
            25% { transform: translateX(-50%) translateY(-10px) scale(1.05); }
            50% { transform: translateX(-50%) translateY(0) scale(1); }
            75% { transform: translateX(-50%) translateY(-5px) scale(1.02); }
        }

        .decoration {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.6;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }
        .dec-1 { top: 15%; left: 5%; animation-delay: 0s; }
        .dec-2 { top: 25%; right: 8%; animation-delay: 1s; font-size: 1.2rem; }
        .dec-3 { bottom: 20%; left: 10%; animation-delay: 2s; }
        .dec-4 { bottom: 15%; right: 5%; animation-delay: 0.5s; font-size: 1.3rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .casino-logo { font-size: 2rem; top: 12px; }
            .slot-machine { padding: 25px 20px 30px; border-radius: 50px 50px 35px 35px; }
            .reels-container { gap: 10px; }
            .reels-container::before, .reels-container::after { display: none; }
            canvas { width: 95px; height: 95px; }
            .balance-box, .bet-box, .win-box { font-size: 1.1rem; padding: 8px 16px; min-width: 120px; }
            button { font-size: 0.95rem; padding: 10px 18px; }
            .spin-btn { font-size: 1.25rem; padding: 10px 35px; }
            .jackpot-light { font-size: 0.95rem; padding: 6px 15px; min-width: 160px; }
            .rules-footer { font-size: 0.65rem; padding: 6px 10px; }
        }

        @media (max-width: 400px) {
            .info-panel { flex-direction: column; align-items: center; }
            .balance-box, .bet-box, .win-box, .jackpot-light { width: 100%; max-width: 280px; }
            .controls { flex-direction: column; align-items: center; }
            button, .spin-btn { width: 100%; max-width: 280px; }
        }
    </style>
</head>

<script>
    (function(){
        // ========== НАСТРОЙКИ "ЧЕСТНОЙ" МАТЕМАТИКИ 😈 ==========
        // Веса символов: БОЛЬШИЕ числа = БОЛЕЕ частые (проигрышные) символы
        const SYMBOLS = ["🍋", "🍊", "🍇", "🔔", "⭐", "🍒", "7️⃣"];
        // 7️⃣ теперь ультра-редкий (1 из ~500), 🍒 редкий, остальные — частые "пустышки"
        const SYMBOL_WEIGHTS = [35, 30, 25, 20, 15, 4, 1]; // Общий вес = 130
        
        let weightedPool = [];
        for(let i=0; i<SYMBOLS.length; i++) {
            for(let w=0; w<SYMBOL_WEIGHTS[i]; w++) {
                weightedPool.push(SYMBOLS[i]);
            }
        }
        
        function getRandomSymbol() {
            return weightedPool[Math.floor(Math.random() * weightedPool.length)];
        }

        const HOUSE_EDGE_CHANCE = 0.15; // 15% шанс "подкрутить" результат
        
        function applyHouseEdge(baseWin, bet) {
            // Даже если выпал выигрыш — с шансом 15% превращаем в 0
            if(baseWin > 0 && Math.random() < HOUSE_EDGE_CHANCE) {
                return 0;
            }
            // Для джекпота — шанс 3% "потерять" его (но показываем красивую анимацию)
            if(baseWin === JACKPOT_AMOUNT && Math.random() < 0.03) {
                return Math.floor(bet * 0.5); // "утешительный" пол-ставочного возврата
            }
            return baseWin;
        }
        
        // Игровые переменные
        let balance = 1000;
        let currentBet = 50;
        let lastWin = 0;
        let isSpinning = false;
        let spinInterval = null;
        let currentSymbols = ["🍋", "🍋", "🍋"]; // Начинаем с "пустышек"
        const JACKPOT_AMOUNT = 5000;
        
        // DOM элементы
        const balanceSpan = document.getElementById('balanceAmount');
        const betSpan = document.getElementById('betAmount');
        const winSpan = document.getElementById('winAmount');
        const spinBtn = document.getElementById('spinButton');
        const decreaseBetBtn = document.getElementById('decreaseBet');
        const increaseBetBtn = document.getElementById('increaseBet');
        const resetBtn = document.getElementById('resetGame');
        const jackpotIndicator = document.getElementById('jackpotIndicator');
        const notification = document.getElementById('notification');
        const screamer = document.getElementById('screamer');
        const screamerClose = document.getElementById('screamerClose');
        
        // Canvas
        const canvas0 = document.getElementById('reel0');
        const canvas1 = document.getElementById('reel1');
        const canvas2 = document.getElementById('reel2');
        const ctx0 = canvas0.getContext('2d');
        const ctx1 = canvas1.getContext('2d');
        const ctx2 = canvas2.getContext('2d');
        
        // === АУДИО ДЛЯ СКРИМЕРА (Web Audio API) ===
        let audioCtx = null;
        function initAudio() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playScreamerSound() {
            if(!audioCtx) return;
            
            // Резкий скример-звук (высокочастотный писк + низкий гул)
            const oscillator1 = audioCtx.createOscillator();
            const oscillator2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator1.type = 'square';
            oscillator1.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
            oscillator1.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.3);
            
            oscillator2.type = 'sawtooth';
            oscillator2.frequency.setValueAtTime(55, audioCtx.currentTime); // Низкий гул
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            oscillator1.connect(gainNode);
            oscillator2.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator1.start();
            oscillator2.start();
            oscillator1.stop(audioCtx.currentTime + 0.4);
            oscillator2.stop(audioCtx.currentTime + 0.4);
        }
        
        // === СКРИМЕР ===
        function triggerScreamer(winAmount) {
            initAudio(); // Инициализируем аудио при первом взаимодействии
            
            screamer.classList.add('active');
            
            // Воспроизводим звук с небольшой задержкой для эффекта
            setTimeout(() => {
                try {
                    if(audioCtx && audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    playScreamerSound();
                } catch(e) {
                    console.log('Audio blocked by browser');
                }
            }, 150);
            
            // Автоскрытие через 3.5 секунды
            setTimeout(() => {
                screamer.classList.remove('active');
            }, 3500);
        }
        
        screamerClose.addEventListener('click', () => {
            screamer.classList.remove('active');
        });
        screamerClose.addEventListener('touchend', (e) => {
            e.preventDefault();
            screamer.classList.remove('active');
        });
        
        // Отрисовка символа
        function drawSymbol(ctx, symbol, width, height) {
            ctx.clearRect(0, 0, width, height);
            
            const grad = ctx.createLinearGradient(0, 0, width, height);
            grad.addColorStop(0, '#fff9e6');
            grad.addColorStop(0.5, '#ffecb3');
            grad.addColorStop(1, '#ffe082');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 3;
            ctx.strokeRect(4, 4, width-8, height-8);
            
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            ctx.lineWidth = 1;
            ctx.strokeRect(8, 8, width-16, height-16);
            
            ctx.font = `bold ${Math.floor(height * 0.52)}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "rgba(107, 27, 107, 0.5)";
            ctx.fillStyle = "#2a1508";
            ctx.fillText(symbol, width/2, height/2);
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctx.font = `${Math.floor(height * 0.18)}px sans-serif`;
            ctx.fillText("✨", width-18, 18);
            
            ctx.fillStyle = "rgba(107, 27, 107, 0.3)";
            ctx.font = `bold ${Math.floor(height * 0.15)}px 'Orbitron', monospace`;
            ctx.fillText("7K", 15, height-12);
        }
        
        function updateAllReelsDisplay() {
            drawSymbol(ctx0, currentSymbols[0], 120, 120);
            drawSymbol(ctx1, currentSymbols[1], 120, 120);
            drawSymbol(ctx2, currentSymbols[2], 120, 120);
        }
        
        // Уведомления
        function showNotification(message, isJackpot = false) {
            notification.textContent = message;
            notification.className = 'notification' + (isJackpot ? ' jackpot' : '');
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 3000);
        }
        
        // Обновление UI
        function updateUI() {
            balanceSpan.innerText = Math.floor(balance);
            betSpan.innerText = currentBet;
            winSpan.innerText = lastWin;
            jackpotIndicator.innerHTML = `🔥 ДЖЕКПОТ: ${JACKPOT_AMOUNT} 🔥`;
            
            if(lastWin > 0) {
                winSpan.style.color = "#ffd700";
                document.querySelector('.display-area').classList.add('win-animation');
                setTimeout(() => {
                    document.querySelector('.display-area').classList.remove('win-animation');
                    if(lastWin === parseInt(winSpan.innerText)) winSpan.style.color = "#fff";
                }, 600);
            } else {
                winSpan.style.color = "#fff";
            }
            
            spinBtn.disabled = (balance < currentBet || isSpinning);
            if(balance <= 0) {
                spinBtn.disabled = true;
                spinBtn.style.opacity = "0.6";
            } else {
                spinBtn.style.opacity = "1";
            }
        }
        
        // === ИСПРАВЛЕННАЯ ЛОГИКА ВЫИГРЫША (с преимуществом казино) ===
        function calculateWin(symbolsArray, bet) {
            const [s1, s2, s3] = symbolsArray;
            
            // 🎰 ДЖЕКПОТ: три семёрки (очень редко!)
            if(s1 === "7️⃣" && s2 === "7️⃣" && s3 === "7️⃣") {
                return applyHouseEdge(JACKPOT_AMOUNT, bet);
            }
            
            // 🏆 Три одинаковых
            if(s1 === s2 && s2 === s3) {
                let multiplier = 3; // Базовый множитель снижен
                
                // 🍒 — редкий премиум (но всё равно с шансом "обнуления")
                if(s1 === "🍒") multiplier = 7;
                
                const baseWin = bet * multiplier;
                return applyHouseEdge(baseWin, bet);
            }
            
            // ✨ Два совпадения — только если это "дорогие" символы
            if(s1 === s2 || s2 === s3 || s1 === s3) {
                // Даём выигрыш только для 🍒 или 7️⃣ (редких)
                if(s1 === "🍒" || s2 === "🍒" || s3 === "🍒" ||
                   s1 === "7️⃣" || s2 === "7️⃣" || s3 === "7️⃣") {
                    const baseWin = bet * 2;
                    return applyHouseEdge(baseWin, bet);
                }
                // Для остальных — 0 (даже при двух совпадениях!)
                return 0;
            }
            
            // 🎁 Микро-возврат за наличие 7️⃣ (чтобы не было совсем обидно)
            if(s1 === "7️⃣" || s2 === "7️⃣" || s3 === "7️⃣") {
                return Math.floor(bet * 0.1); // 10% возврата
            }
            
            return 0;
        }
        
        // === ИСПРАВЛЕННАЯ АНИМАЦИЯ (с "подкруткой" результата) ===
        async function spinSlots() {
            if(isSpinning) return;
            if(balance < currentBet) {
                showNotification("⚠️ Недостаточно средств!");
                return;
            }
            
            isSpinning = true;
            updateUI();
            balance -= currentBet;
            lastWin = 0;
            updateUI();
            
            // === ПРЕДВАРИТЕЛЬНЫЙ РАСЧЁТ РЕЗУЛЬТАТА (для "честной" подкрутки) ===
            // С шансом 88% — гарантированный проигрыш
            const forceLoss = Math.random() < 0.88;
            let predeterminedSymbols;
            
            if(forceLoss) {
                // Генерируем заведомо проигрышную комбинацию
                const losingSymbols = ["🍋", "🍊", "🍇", "🔔", "⭐"];
                predeterminedSymbols = [
                    losingSymbols[Math.floor(Math.random() * losingSymbols.length)],
                    losingSymbols[Math.floor(Math.random() * losingSymbols.length)],
                    losingSymbols[Math.floor(Math.random() * losingSymbols.length)]
                ];
                // Но делаем так, чтобы выглядело "почти выигрышно" (2 совпадения из "дешёвых")
                if(Math.random() < 0.4) {
                    const same = losingSymbols[Math.floor(Math.random() * 3)];
                    predeterminedSymbols[0] = same;
                    predeterminedSymbols[1] = same;
                }
            } else {
                // 12% шанс на реальный выигрыш
                predeterminedSymbols = null; // Будет сгенерирован случайно
            }
            // ==========
            
            let finalSymbols = ["", "", ""];
            const spinDuration = [400, 520, 640];
            const spinSteps = 14;
            
            function animateReel(index, durationMs, callbackFinal) {
                const canvasCtx = [ctx0, ctx1, ctx2][index];
                const steps = spinSteps;
                let step = 0;
                const intervalTime = durationMs / steps;
                
                let rollingInterval = setInterval(() => {
                    let randomSym = getRandomSymbol();
                    drawSymbol(canvasCtx, randomSym, 120, 120);
                    step++;
                    if(step >= steps) {
                        clearInterval(rollingInterval);
                        
                        // === ПРИМЕНЯЕМ ПРЕДОПРЕДЕЛЁННЫЙ РЕЗУЛЬТАТ ===
                        const finalSym = predeterminedSymbols ? predeterminedSymbols[index] : getRandomSymbol();
                        finalSymbols[index] = finalSym;
                        drawSymbol(canvasCtx, finalSym, 120, 120);
                        if(callbackFinal) callbackFinal();
                    }
                }, intervalTime);
            }
            
            let completed = 0;
            function onReelDone() {
                completed++;
                if(completed === 3) {
                    currentSymbols = [...finalSymbols];
                    const winAmount = calculateWin(currentSymbols, currentBet);
                    lastWin = winAmount;
                    
                    if(winAmount > 0) {
                        balance += winAmount;
                        winSpan.innerText = winAmount;
                        
                        // === СКРИМЕР ПРИ ВЫИГРЫШЕ ===
                        if(winAmount >= currentBet * 5) {
                            triggerScreamer(winAmount);
                        }
                        
                        if(winAmount === JACKPOT_AMOUNT) {
                            showNotification("🎉🎉 НЕВЕРОЯТНО! ДЖЕКПОТ 7K! 🎉🎉", true);
                            [ctx0, ctx1, ctx2].forEach(ctx => {
                                ctx.fillStyle = "rgba(255, 215, 0, 0.7)";
                                ctx.globalAlpha = 0.5;
                                ctx.fillRect(0,0,120,120);
                                ctx.globalAlpha = 1;
                            });
                            setTimeout(() => updateAllReelsDisplay(), 200);
                        } else if(winAmount >= currentBet*5) {
                            showNotification(`🔥 ОГО! Выигрыш: ${winAmount}!`);
                        } else {
                            showNotification(`✅ Мелочь, а приятно: ${winAmount}`);
                        }
                    } else {
                        winSpan.innerText = "0";
                        // Частые "почти-выигрыши" для психологического эффекта
                        if(currentSymbols[0] === currentSymbols[1] || 
                           currentSymbols[1] === currentSymbols[2]) {
                            showNotification("🤏 Почти! В следующий раз повезёт!");
                        }
                    }
                    
                    updateUI();
                    isSpinning = false;
                    updateAllReelsDisplay();
                    
                    if(balance <= 0) {
                        showNotification("💸 Баланс исчерпан! Казино говорит: 'Приходи ещё!' 😉");
                        spinBtn.disabled = true;
                    }
                }
            }
            
            animateReel(0, spinDuration[0], onReelDone);
            animateReel(1, spinDuration[1], onReelDone);
            animateReel(2, spinDuration[2], onReelDone);
        }
        
        // Изменение ставки
        function changeBet(delta) {
            if(isSpinning) return;
            let newBet = currentBet + delta;
            const minBet = 10;
            const maxBet = Math.min(500, balance > 0 ? balance : 500);
            
            if(newBet >= minBet && newBet <= maxBet) {
                currentBet = newBet;
            } else if (newBet < minBet) currentBet = minBet;
            else if (newBet > maxBet) currentBet = maxBet;
            
            if(currentBet > balance && balance > 0) currentBet = balance;
            if(currentBet < 10) currentBet = 10;
            updateUI();
        }
        
        // Сброс игры
        function resetGame() {
            if(isSpinning) return;
            balance = 1000;
            currentBet = 50;
            lastWin = 0;
            currentSymbols = ["🍋", "🍋", "🍋"];
            updateAllReelsDisplay();
            updateUI();
            isSpinning = false;
            if(spinInterval) clearInterval(spinInterval);
            spinBtn.disabled = false;
            showNotification("🔄 Игра сброшена | Пусть удача будет с... казино! 😏");
        }
        
        // Инициализация
        function initDisplay() {
            updateAllReelsDisplay();
            updateUI();
        }
        
        // === ИСПРАВЛЕННЫЕ ОБРАБОТЧИКИ (mobile-friendly) ===
        function bindTap(element, handler) {
            // Поддержка и touch, и click, с предотвращением дублей
            let lastTouchEnd = 0;
            
            element.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                const now = Date.now();
                if(now - lastTouchEnd <= 300) return; // Защита от дублей
                lastTouchEnd = now;
                handler(e);
            }, {passive: false});
            
            element.addEventListener('click', function(e) {
                // Игнорируем click если был недавний touchend
                const now = Date.now();
                if(now - lastTouchEnd <= 350) return;
                handler(e);
            });
        }
        
        // Привязываем обработчики
        bindTap(spinBtn, () => {
            if(!isSpinning && balance >= currentBet) {
                // Инициализируем аудио при первом нажатии (требование браузеров)
                initAudio();
                spinSlots().catch(e=>console.warn(e));
            } else if(balance < currentBet) {
                showNotification("⚠️ Увеличьте баланс или уменьшите ставку");
            }
        });
        
        bindTap(decreaseBetBtn, () => changeBet(-10));
        bindTap(increaseBetBtn, () => changeBet(10));
        bindTap(resetBtn, () => resetGame());
        
        // Также поддерживаем обычные click для десктопа
        spinBtn.addEventListener('click', (e) => {
            if(e.pointerType !== 'touch' && !isSpinning && balance >= currentBet) {
                initAudio();
                spinSlots().catch(e=>console.warn(e));
            }
        });
        
        // Горячие клавиши
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' && !isSpinning && balance >= currentBet) {
                e.preventDefault();
                initAudio();
                spinSlots();
            }
            if(e.code === 'ArrowUp') { e.preventDefault(); changeBet(10); }
            if(e.code === 'ArrowDown') { e.preventDefault(); changeBet(-10); }
            if(e.code === 'KeyR') { e.preventDefault(); resetGame(); }
        });
        
        // Эффект мигания выигрыша
        setInterval(() => {
            if(lastWin > 0 && !isSpinning) {
                const winElement = document.getElementById('winAmount');
                if(winElement && parseInt(winElement.innerText) > 0) {
                    winElement.style.textShadow = "0 0 8px #ffd700, 0 0 15px rgba(255,215,0,0.7)";
                    setTimeout(() => winElement.style.textShadow = "0 2px 0 rgba(0,0,0,0.5)", 400);
                }
            }
        }, 700);
        
        // Запуск
        console.log("🎰 7K Casino Loaded | House Edge: 88% | Good luck... you'll need it! 😈");
        initDisplay();
        
        // Предварительная инициализация аудио (требует взаимодействия пользователя)
        document.addEventListener('click', initAudio, {once: true});
        document.addEventListener('touchstart', initAudio, {once: true});
    })();
</script>
