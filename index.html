<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
    <title>7K Casino | HORROR EDITION - Звуки тьмы</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Creepster&display=swap" rel="stylesheet">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --7k-gold: #ffd700;
            --7k-gold-dark: #b8860b;
            --7k-purple: #6b1b6b;
            --7k-black: #0a0a0f;
            --7k-red: #8b0000;
            --7k-blood-bright: #cc0000;
        }

        body {
            background: radial-gradient(ellipse at top, #1a000a 0%, #0a0a0f 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 15px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(ellipse 15px 80px at 5% 10%, rgba(139,0,0,0.4), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .slot-machine {
            background: linear-gradient(145deg, #1a0a0a, #0d0505);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,215,0,0.3);
            border: 1px solid #8b0000;
        }

        .display-area {
            background: #0a0505;
            border-radius: 40px;
            padding: 20px;
            box-shadow: inset 0 0 20px #000;
        }

        .reels-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .reel {
            background: #1a0a0a;
            border-radius: 20px;
            padding: 10px;
            box-shadow: inset 0 0 0 2px #8b0000, 0 5px 15px black;
        }

        canvas {
            display: block;
            width: 100px;
            height: 100px;
            background: #2a1a1a;
            border-radius: 15px;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            background: #1a0a0aaa;
            backdrop-filter: blur(8px);
            padding: 12px;
            border-radius: 30px;
            margin-bottom: 15px;
        }

        .balance-box, .bet-box, .win-box {
            background: #000000aa;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
        }

        .balance-box span, .bet-box span, .win-box span {
            font-size: 0.8rem;
            color: #cc8888;
            margin-right: 5px;
        }

        .jackpot-light {
            background: linear-gradient(45deg, #8b0000, #cc0000);
            border: none;
            padding: 5px 15px;
            border-radius: 25px;
            font-weight: bold;
            color: #ffd700;
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(to bottom, #8b0000, #3a0000);
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 30px;
            color: #ffd700;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #2a0000;
            font-family: inherit;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2a0000;
        }

        .spin-btn {
            background: linear-gradient(to bottom, #cc0000, #6b0000);
            font-size: 1.2rem;
            padding: 8px 25px;
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .rules-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 0.7rem;
            color: #aa5555;
        }

        .casino-logo {
            position: fixed;
            top: 10px;
            left: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            color: #ffd700;
            text-shadow: 0 0 10px #8b0000;
            z-index: 10;
        }

        .casino-logo span { color: #cc0000; font-size: 2rem; }

        .notification {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #8b0000dd;
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        .notification.show { opacity: 1; }

        .screamer-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000000ee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }

        .screamer-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .screamer-face {
            font-size: 5rem;
            animation: shake 0.2s infinite;
        }

        .screamer-text {
            color: #ff0000;
            font-size: 1.5rem;
            text-align: center;
            margin: 20px;
            font-family: 'Creepster', cursive;
        }

        .screamer-close {
            background: #8b0000;
            padding: 10px 30px;
            font-size: 1.2rem;
        }

        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a0a0a;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            padding: 0;
            z-index: 10;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-5px,5px); }
            75% { transform: translate(5px,-5px); }
        }

        @media (max-width: 600px) {
            canvas { width: 70px; height: 70px; }
            .balance-box, .bet-box, .win-box { font-size: 0.9rem; padding: 3px 10px; }
            button { padding: 5px 12px; font-size: 0.8rem; }
            .spin-btn { font-size: 1rem; }
            .casino-logo { font-size: 1.2rem; top: 5px; left: 10px; }
        }
    </style>
</head>
<body>

    <div class="casino-logo">7<span>K</span> CASINO</div>
    <div class="notification" id="notification">🩸</div>

    <div class="screamer-overlay" id="screamer">
        <div class="screamer-face">😱👹🩸💀🔪</div>
        <div class="screamer-text">ТЫ ВЫИГРАЛ ДЖЕКПОТ...<br>НО ОНИ ТЕПЕРЬ ЗНАЮТ... 🔥</div>
        <button class="screamer-close" id="screamerClose">ЗАБРАТЬ И БЕЖАТЬ</button>
    </div>

    <button class="sound-toggle" id="soundToggle">🔊</button>

    <div class="slot-machine">
        <div class="display-area">
            <div class="reels-container">
                <div class="reel"><canvas id="reel0" width="128" height="128"></canvas></div>
                <div class="reel"><canvas id="reel1" width="128" height="128"></canvas></div>
                <div class="reel"><canvas id="reel2" width="128" height="128"></canvas></div>
            </div>

            <div class="info-panel">
                <div class="balance-box"><span>🩸 БАЛАНС</span> <span id="balanceAmount">1000</span></div>
                <div class="bet-box"><span>💀 СТАВКА</span> <span id="betAmount">50</span></div>
                <div class="win-box"><span>👁️ ВЫИГРЫШ</span> <span id="winAmount">0</span></div>
                <button class="jackpot-light" id="jackpotIndicator">🔥 ДЖЕКПОТ: 5000 🔥</button>
            </div>

            <div class="controls">
                <button id="decreaseBet">− СТАВКА</button>
                <button id="increaseBet">+ СТАВКА</button>
                <button id="spinButton" class="spin-btn">🩸 КРУТИТЬ 🩸</button>
                <button id="resetGame">🔄 СБРОС</button>
            </div>

            <p class="rules-footer">
                <strong>ПРАВИЛА:</strong> 3×💀 = ДЖЕКПОТ (5000) | 3 одинаковых = ×5 | 2 одинаковых = ×2<br>
                <span style="color:#cc4444;">⚠️ КАЖДЫЙ 20-Й СПИН ПРИЗЫВАЕТ ДУХОВ ⚠️</span>
            </p>
        </div>
    </div>

<script>
    // ========== СИМВОЛЫ И ВЕСА ==========
    const SYMBOLS = ["🍒", "🍋", "🍊", "🍉", "🔔", "⭐", "💀"];
    const SYMBOL_WEIGHTS = [25, 25, 20, 15, 10, 8, 2];
    const JACKPOT = 5000;

    let weightedPool = [];
    for (let i = 0; i < SYMBOLS.length; i++) {
        for (let w = 0; w < SYMBOL_WEIGHTS[i]; w++) {
            weightedPool.push(SYMBOLS[i]);
        }
    }

    function getRandomSymbol() {
        return weightedPool[Math.floor(Math.random() * weightedPool.length)];
    }

    // ========== ИГРОВЫЕ ПЕРЕМЕННЫЕ ==========
    let balance = 1000;
    let currentBet = 50;
    let lastWin = 0;
    let isSpinning = false;
    let currentSymbols = ["🍒", "🍒", "🍒"];
    let isMuted = false;
    let spinCounter = 0;          // Счётчик спинов для скримера (каждый 20-й)
    let audioInitialized = false;
    
    // ========== АУДИО КОНТЕКСТ ==========
    let audioCtx = null;
    let masterGain = null;
    let bgOscillator = null;
    let bgGain = null;
    let isMusicPlaying = false;
    let musicInterval = null;
    
    // DOM элементы
    const balanceSpan = document.getElementById('balanceAmount');
    const betSpan = document.getElementById('betAmount');
    const winSpan = document.getElementById('winAmount');
    const spinBtn = document.getElementById('spinButton');
    const decreaseBetBtn = document.getElementById('decreaseBet');
    const increaseBetBtn = document.getElementById('increaseBet');
    const resetBtn = document.getElementById('resetGame');
    const jackpotIndicator = document.getElementById('jackpotIndicator');
    const notification = document.getElementById('notification');
    const screamer = document.getElementById('screamer');
    const screamerClose = document.getElementById('screamerClose');
    const soundToggle = document.getElementById('soundToggle');

    // Canvas
    const canvas0 = document.getElementById('reel0');
    const canvas1 = document.getElementById('reel1');
    const canvas2 = document.getElementById('reel2');
    const ctx0 = canvas0.getContext('2d');
    const ctx1 = canvas1.getContext('2d');
    const ctx2 = canvas2.getContext('2d');

    // ========== ОТРИСОВКА ==========
    function drawSymbol(ctx, symbol, w, h) {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#2a1a1a';
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.strokeRect(5, 5, w-10, h-10);
        ctx.font = `bold ${Math.floor(h * 0.55)}px "Segoe UI Emoji"`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = '#ffd700';
        ctx.fillText(symbol, w/2, h/2);
    }

    function updateReels() {
        drawSymbol(ctx0, currentSymbols[0], 128, 128);
        drawSymbol(ctx1, currentSymbols[1], 128, 128);
        drawSymbol(ctx2, currentSymbols[2], 128, 128);
    }

    // ========== АУДИО СИСТЕМА ==========
    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = isMuted ? 0 : 0.35;
            masterGain.connect(audioCtx.destination);
            audioInitialized = true;
            startBackgroundMusic();
        } catch(e) { console.warn("Audio not supported"); }
    }
    
    // Жуткая фоновая музыка (атмосферный дрон + случайные звуки)
    function startBackgroundMusic() {
        if (!audioCtx || isMusicPlaying) return;
        isMusicPlaying = true;
        
        // Основной гул
        bgOscillator = audioCtx.createOscillator();
        bgOscillator.type = 'sine';
        bgOscillator.frequency.setValueAtTime(48 + Math.random() * 8, audioCtx.currentTime);
        
        bgGain = audioCtx.createGain();
        bgGain.gain.value = isMuted ? 0 : 0.12;
        
        bgOscillator.connect(bgGain);
        bgGain.connect(masterGain);
        bgOscillator.start();
        
        // Добавляем низкочастотный гул
        const subOsc = audioCtx.createOscillator();
        subOsc.type = 'triangle';
        subOsc.frequency.setValueAtTime(36, audioCtx.currentTime);
        const subGain = audioCtx.createGain();
        subGain.gain.value = isMuted ? 0 : 0.08;
        subOsc.connect(subGain);
        subGain.connect(masterGain);
        subOsc.start();
        
        // Случайные хоррор-звуки каждые 10-25 секунд
        function randomHorrorSound() {
            if (!isMusicPlaying || isMuted || !audioCtx) {
                setTimeout(randomHorrorSound, 15000);
                return;
            }
            const type = Math.random();
            const noise = audioCtx.createOscillator();
            const noiseGain = audioCtx.createGain();
            noise.type = type < 0.5 ? 'sawtooth' : 'square';
            noise.frequency.setValueAtTime(80 + Math.random() * 120, audioCtx.currentTime);
            noise.frequency.exponentialRampToValueAtTime(40 + Math.random() * 60, audioCtx.currentTime + 0.8);
            noiseGain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            noise.connect(noiseGain);
            noiseGain.connect(masterGain);
            noise.start();
            noise.stop(audioCtx.currentTime + 1.2);
            
            setTimeout(randomHorrorSound, 10000 + Math.random() * 15000);
        }
        randomHorrorSound();
    }
    
    // Звук вращения барабанов (короткий шум)
    function playSpinSound() {
        if (!audioCtx || isMuted || !audioInitialized) return;
        try {
            const now = audioCtx.currentTime;
            const noise = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            noise.type = 'sawtooth';
            noise.frequency.setValueAtTime(300, now);
            noise.frequency.exponentialRampToValueAtTime(120, now + 0.35);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            noise.connect(gain);
            gain.connect(masterGain);
            noise.start();
            noise.stop(now + 0.4);
        } catch(e) {}
    }
    
    // Звук выигрыша
    function playWinSound(amount) {
        if (!audioCtx || isMuted || !audioInitialized) return;
        try {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            let baseFreq = 440;
            if (amount >= 5000) baseFreq = 880;
            else if (amount >= 500) baseFreq = 660;
            else baseFreq = 523.25;
            osc.frequency.setValueAtTime(baseFreq, now);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, now + 0.3);
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(now + 0.6);
        } catch(e) {}
    }
    
    // Звук проигрыша
    function playLoseSound() {
        if (!audioCtx || isMuted || !audioInitialized) return;
        try {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(220, now);
            osc.frequency.exponentialRampToValueAtTime(110, now + 0.4);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(now + 0.5);
        } catch(e) {}
    }
    
    // Ужасный звук для скримера
    function playScreamerSound() {
        if (!audioCtx || isMuted || !audioInitialized) return;
        try {
            const now = audioCtx.currentTime;
            // Визг
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(880, now);
            osc1.frequency.exponentialRampToValueAtTime(440, now + 0.5);
            gain1.gain.setValueAtTime(0.35, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
            osc1.connect(gain1);
            gain1.connect(masterGain);
            osc1.start();
            osc1.stop(now + 0.8);
            
            // Низкий удар
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(60, now);
            gain2.gain.setValueAtTime(0.3, now);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
            osc2.connect(gain2);
            gain2.connect(masterGain);
            osc2.start();
            osc2.stop(now + 0.6);
        } catch(e) {}
    }
    
    // ========== UI ФУНКЦИИ ==========
    function updateUI() {
        balanceSpan.innerText = Math.floor(balance);
        betSpan.innerText = currentBet;
        winSpan.innerText = lastWin;
        if (balance < currentBet || isSpinning) {
            spinBtn.disabled = true;
        } else {
            spinBtn.disabled = false;
        }
        if (balance <= 0) spinBtn.disabled = true;
    }
    
    function showNotification(msg, isError = false) {
        notification.innerText = msg;
        notification.classList.add('show');
        setTimeout(() => notification.classList.remove('show'), 2000);
    }
    
    function showScreamer() {
        playScreamerSound();
        screamer.classList.add('show');
        setTimeout(() => {
            if (screamer.classList.contains('show')) {
                screamer.classList.remove('show');
            }
        }, 4000);
    }
    
    // ========== ЛОГИКА ВЫИГРЫША ==========
    function calculateWin(symbols, bet) {
        const [s1, s2, s3] = symbols;
        if (s1 === "💀" && s2 === "💀" && s3 === "💀") {
            return JACKPOT;
        }
        if (s1 === s2 && s2 === s3) {
            let mult = 5;
            if (s1 === "⭐" || s1 === "🔔") mult = 7;
            return bet * mult;
        }
        if (s1 === s2 || s2 === s3 || s1 === s3) {
            return bet * 2;
        }
        return 0;
    }
    
    // ========== ОСНОВНОЙ СПИН ==========
    function spin() {
        if (isSpinning) return;
        if (balance < currentBet) {
            showNotification("❌ Недостаточно средств!", true);
            return;
        }
        
        // Инициализируем аудио при первом спине (политика автоигра)
        if (!audioInitialized) {
            initAudio();
        }
        
        // Проигрываем звук вращения
        playSpinSound();
        
        isSpinning = true;
        balance -= currentBet;
        lastWin = 0;
        updateUI();
        
        let spins = 0;
        const totalSpins = 12;
        const interval = setInterval(() => {
            const r1 = getRandomSymbol();
            const r2 = getRandomSymbol();
            const r3 = getRandomSymbol();
            drawSymbol(ctx0, r1, 128, 128);
            drawSymbol(ctx1, r2, 128, 128);
            drawSymbol(ctx2, r3, 128, 128);
            spins++;
            if (spins >= totalSpins) {
                clearInterval(interval);
                const final1 = getRandomSymbol();
                const final2 = getRandomSymbol();
                const final3 = getRandomSymbol();
                currentSymbols = [final1, final2, final3];
                updateReels();
                
                const win = calculateWin(currentSymbols, currentBet);
                lastWin = win;
                if (win > 0) {
                    balance += win;
                    playWinSound(win);
                    showNotification(`🎉 ВЫИГРЫШ: ${win} 🎉`);
                    if (win === JACKPOT) {
                        showScreamer();
                        showNotification("💀 ДЖЕКПОТ! ДУХИ ПРОСНУЛИСЬ 💀");
                    }
                } else {
                    playLoseSound();
                    showNotification("😭 ПРОИГРЫШ...", true);
                }
                
                // Увеличиваем счётчик спинов
                spinCounter++;
                updateUI();
                
                // *** СКРИМЕР КАЖДЫЙ 20-Й СПИН ***
                if (spinCounter % 20 === 0 && spinCounter > 0) {
                    showNotification("👁️ ТЫ ЧУВСТВУЕШЬ ВЗГЛЯД? 👁️", false);
                    setTimeout(() => {
                        showScreamer();
                    }, 300);
                }
                
                isSpinning = false;
            }
        }, 55);
    }
    
    // ========== УПРАВЛЕНИЕ СТАВКОЙ ==========
    function changeBet(delta) {
        if (isSpinning) return;
        let newBet = currentBet + delta;
        if (newBet >= 10 && newBet <= Math.min(500, balance > 0 ? balance : 500)) {
            currentBet = newBet;
        } else if (newBet < 10) {
            currentBet = 10;
        } else if (newBet > balance && balance > 0) {
            currentBet = balance;
        }
        updateUI();
    }
    
    function resetGame() {
        if (isSpinning) return;
        balance = 1000;
        currentBet = 50;
        lastWin = 0;
        spinCounter = 0;   // сброс счётчика скримера
        currentSymbols = ["🍒", "🍒", "🍒"];
        updateReels();
        updateUI();
        showNotification("🔄 Игра сброшена! Счётчик скримера обнулён.");
    }
    
    function toggleSound() {
        isMuted = !isMuted;
        soundToggle.innerText = isMuted ? "🔇" : "🔊";
        if (masterGain) {
            masterGain.gain.value = isMuted ? 0 : 0.35;
        }
        if (bgGain) {
            bgGain.gain.value = isMuted ? 0 : 0.12;
        }
        showNotification(isMuted ? "🔇 Звук выключен" : "🔊 Звук включён");
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ И СОБЫТИЯ ==========
    spinBtn.addEventListener('click', spin);
    decreaseBetBtn.addEventListener('click', () => changeBet(-10));
    increaseBetBtn.addEventListener('click', () => changeBet(10));
